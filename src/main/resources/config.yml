# ╔══════════════════════════════════════════════════════════╗
# ║              MyPlaceholder - Configuration               ║
# ╚══════════════════════════════════════════════════════════╝

# ── General ───────────────────────────────────────────────────────
version: "1.0.1"

# Language file to use (must exist in lang/ folder)
# Available: en_US, es_ES
lang: "en_US"

# Plugin command aliases (requires restart to apply)
aliases:
  - "mp"
  - "mypl"

# ── Debug ─────────────────────────────────────────────────────────
debug: false

# ── Metrics (bStats) ──────────────────────────────────────────────
metrics: true

# ── Update Checker ────────────────────────────────────────────────
check-updates: true
notify-updates: true
